<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  
  <style>  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }    

    :root{  
      --bg1:#020208;  
      --bg2:#080417;  
      --bg3:#10062b;  
      --card:rgba(13, 6, 28, 0.85);  
      --line:rgba(0, 240, 255, 0.35);  
      --line-2:rgba(255, 0, 128, 0.25);  
      --text:#f2f0ff;  
      --muted:#b6a2e8;  
      --neon:#00f0ff;  
      --neon2:#ff007f;  
      --pink:#ff00d4;  
      --purple:#8a2be2;  
      --green:#00ffaa;  
      --yellow:#ffe600;  
      --shadow:0 0 40px rgba(0,240,255,0.22);  
    }  

    html{ scroll-behavior:smooth; }

    body{
      min-height:100vh;
      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 20% 10%, rgba(0, 240, 255, 0.2), transparent 30%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 128, 0.22), transparent 35%),
        radial-gradient(circle at 50% 80%, rgba(138, 43, 226, 0.25), transparent 40%),
        linear-gradient(135deg, var(--bg1), var(--bg2) 45%, var(--bg3));
      position:relative;
    }

    /* Moving Hologram Grid */
    .grid-bg{
      position:fixed;
      inset:0;
      background-image:
        linear-gradient(rgba(0, 240, 255, 0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 0, 128, 0.1) 1px, transparent 1px);
      background-size:45px 45px;
      animation:gridMove 8s linear infinite;
      pointer-events:none;
      z-index:0;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,1) 30%, rgba(255,255,255,0.1));
    }

    @keyframes gridMove{
      0%{transform:translateY(0) scale(1);}
      50%{transform:translateY(22.5px) scale(1.02);}
      100%{transform:translateY(45px) scale(1);}
    }

    .noise{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:0.035;
      background-image:
        radial-gradient(circle at 25% 25%, #fff 0.8px, transparent 0.9px),
        radial-gradient(circle at 75% 45%, #fff 0.8px, transparent 0.9px);
      background-size: 100px 100px;
    }

    /* Dynamic Hologram Glowing Orbs */
    .orb{
      position:fixed;
      border-radius:50%;
      filter:blur(60px);
      pointer-events:none;
      z-index:0;
      opacity:0.3;
      animation:floatOrb 6s ease-in-out infinite alternate;
    }

    .orb1{
      width:300px;
      height:300px;
      background:var(--neon);
      top:-40px;
      left:-60px;
    }

    .orb2{
      width:320px;
      height:320px;
      background:var(--neon2);
      right:-80px;
      bottom:80px;
      animation-duration:8s;
    }

    .orb3{
      width:250px;
      height:250px;
      background:var(--purple);
      top:45%;
      left:50%;
      transform:translateX(-50%);
      animation-duration:10s;
      opacity:0.2;
    }

    @keyframes floatOrb{
      0%{transform:translate(0, 0) scale(1);}
      100%{transform:translate(30px, 35px) scale(1.2);}
    }

    #matrixCanvas{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      opacity:0.25;
      pointer-events:none;
    }

    .scanlines{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:0.06;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.08) 0px,
          rgba(255,255,255,0.08) 1px,
          transparent 2px,
          transparent 4px
        );
      animation:scanMove 3s linear infinite;
    }

    @keyframes scanMove{
      from{transform:translateY(0);}
      to{transform:translateY(16px);}
    }

    .container{
      width:min(1040px, 92%);
      margin:0 auto;
      position:relative;
      z-index:2;
      padding:10px 0 42px;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 5px;
    }

    .profile-pic-center {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 5px;
    }

    .round-profile{
      width:135px;
      height:135px;
      padding:4px;
      border-radius:50%;
      overflow:hidden;
      position:relative;
      background:linear-gradient(
        45deg,
        var(--neon),
        var(--neon2),
        var(--purple),
        var(--green),
        var(--yellow),
        var(--neon)
      );
      background-size:400% 400%;
      animation:rgbBorder 5s ease infinite;
      box-shadow: 0 0 35px rgba(0,240,255,0.5), 0 0 20px rgba(255,0,128,0.4);
    }

    .round-profile img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }

    @keyframes rgbBorder{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(20, 10, 40, 0.9), rgba(10, 5, 22, 0.85));
      backdrop-filter: blur(20px);
      box-shadow:
        0 20px 50px rgba(0,0,0,0.6),
        0 0 30px rgba(0,240,255,0.15) inset,
        var(--shadow);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
      transition: 0.3s ease;
    }

    .hero-box.bruno-small-box {
      width: 60%;
      margin: 0 auto;
      padding: 10px 30px;
      border-radius: 14px;
      margin-top: -2px;
      border-color: var(--line-2);
    }

    .hero-box::before {
      content: "";
      position: absolute;
      inset: -1px;
      background: linear-gradient(90deg,
        rgba(0,240,255,0.25),
        rgba(255,0,128,0.25),
        rgba(138,43,226,0.25),
        rgba(0,255,170,0.25)
      );
      filter: blur(15px);
      z-index: 0;
      opacity: 0.8;
      animation: rgbBorder 6s linear infinite;
      background-size: 200% 200%;
    }

    .hero-box > * { position: relative; z-index: 1; }

    .hero-title{
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1.6px;
      font-size:clamp(1.2rem, 3.2vw, 2.4rem);
      line-height:1.2;
      white-space:nowrap;
      background:linear-gradient(
        90deg,
        #ffffff 0%,
        var(--neon) 20%,
        var(--neon2) 40%,
        var(--purple) 60%,
        var(--green) 80%,
        #ffffff 100%
      );
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:rgbText 4.5s linear infinite;
      text-shadow:
        0 0 15px rgba(0,240,255,0.3),
        0 0 25px rgba(255,0,128,0.2);
    }

    .hero-subtitle{
      font-family:"Orbitron", sans-serif;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing: 1.4px;
      font-size:clamp(0.85rem, 2.2vw, 1.2rem);
      line-height:1.2;
      white-space:nowrap;
      display: block;
      text-align: center;
      background:linear-gradient(
        90deg,
        #ffffff 0%,
        var(--neon2) 25%,
        var(--neon) 50%,
        var(--pink) 75%,
        #ffffff 100%
      );
      background-size:300% 100%;
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      animation:brunoGlow 4s linear infinite;
      text-shadow:
        0 0 12px rgba(255,0,128,0.35),
        0 0 20px rgba(0,240,255,0.25);
    }

    @keyframes rgbText{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    @keyframes brunoGlow{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    .panel{
      position:relative;
      overflow:hidden;
      border:1px solid var(--line);
      background:var(--card);
      border-radius:24px;
      padding:24px;
      box-shadow:
        0 20px 60px rgba(0,0,0,0.5),
        0 0 20px rgba(0,240,255,0.1) inset,
        var(--shadow);
      backdrop-filter:blur(16px);
      margin-top:20px;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .panel:hover{
      border-color: rgba(255,0,128,0.4);
      box-shadow: 0 0 45px rgba(255,0,128,0.25);
    }

    .panel-title{
      font-family:"Orbitron", sans-serif;
      font-size:1.05rem;
      font-weight:800;
      letter-spacing:1px;
      margin-bottom:18px;
      display:flex;
      align-items:center;
      gap:12px;
      color:#ffffff;
      text-transform:uppercase;
      flex-wrap:wrap;
    }

    .problem-heading{
      text-transform:none !important;
      font-size:1rem;
      white-space:nowrap;
    }

    .panel-title i{
      color:var(--neon);
      font-size:1.1rem;
      filter:drop-shadow(0 0 10px var(--neon));
    }

    .social-grid{
      display:flex;
      gap:15px;
      justify-content:space-between;
    }

    .social-btn{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      padding:18px;
      border-radius:20px;
      background:linear-gradient(180deg, #180d30 0%, #0d061c 100%);
      border:1px solid rgba(0,240,255,0.15);
      color:#fff;
      text-decoration:none;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
      position:relative;
      overflow:hidden;
    }

    .social-btn::after{
      content:'';
      position:absolute;
      top:-50%; left:-50%;
      width:200%; height:200%;
      background:radial-gradient(circle, rgba(0,240,255,0.2), transparent 60%);
      opacity:0;
      transition:0.4s ease;
    }

    .social-btn:hover::after{
      opacity:1;
    }

    .social-btn:hover{
      transform:translateY(-5px) scale(1.02);
      background:linear-gradient(180deg, #241348 0%, #15092e 100%);
      border-color:var(--neon2);
      box-shadow:0 0 30px rgba(255,0,128,0.3);
    }

    .social-btn i{
      font-size:22px;
      color:var(--neon);
      width:22px;
      text-align:center;
      transition: 0.3s ease;
    }

    .social-btn:hover i{
      color:var(--neon2);
      transform:scale(1.2);
      filter:drop-shadow(0 0 10px var(--neon2));
    }

    .social-btn span{
      font-size:15px;
      font-weight:700;
      color:#fff;
    }

    form{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:4px;
    }

    .full{ grid-column:1 / -1; }

    .input-wrap{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:13.5px;
      color:#e6dcff;
      font-weight:700;
      letter-spacing:.25px;
    }

    input, select, textarea{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:15px 16px;
      background:rgba(255,255,255,0.035);
      border:1px solid rgba(0,240,255,0.2);
      color:var(--text);
      font-size:15px;
      transition:0.25s ease;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.01);
    }

    input::placeholder, textarea::placeholder{
      color:#8d78b8;
    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--neon);
      box-shadow:0 0 0 4px rgba(0,240,255,0.12), 0 0 25px rgba(0,240,255,0.25);
      background:rgba(255,255,255,0.06);
    }

    select option{
      background:#0f0724;
      color:#f2f0ff;
    }

    textarea{
      min-height:185px;
      resize:vertical;
      line-height:1.65;
    }

    .helper{
      color:#d5f0e8;
      font-size:13px;
      line-height:1.55;
      margin-top:6px;
      font-weight:500;
    }

    .submit-btn{
      position:relative;
      overflow:hidden;
      border:none;
      outline:none;
      padding:16px 20px;
      border-radius:18px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#ffffff;
      background:linear-gradient(
        90deg,
        var(--neon),
        var(--neon2),
        var(--purple),
        var(--pink),
        var(--green),
        var(--neon)
      );
      background-size:300% 100%;
      animation:buttonFlow 4s linear infinite;
      transition:0.3s ease;
      box-shadow:
        0 14px 30px rgba(0,240,255,0.25),
        0 0 20px rgba(255,0,128,0.2);
    }

    .submit-btn::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
      transform:translateX(-100%);
      transition:0.6s ease;
    }

    .submit-btn:hover::before{
      transform:translateX(100%);
    }

    @keyframes buttonFlow{
      0%{ background-position:0% 50%; }
      100%{ background-position:300% 50%; }
    }

    .submit-btn:hover{
      transform:translateY(-3px) scale(1.01);
      box-shadow:
        0 18px 40px rgba(0,240,255,0.4),
        0 0 30px rgba(255,0,128,0.35);
    }

    .submit-btn i{ margin-right:8px; font-size:18px; }

    .footer {
      margin-top: 15px;
      padding: 10px 2px 0;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.5px;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      text-transform: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #8c78b3;
    }

    .footer-text {
      display: inline-block;
      color: inherit;
    }

    @media (max-width: 820px){
      form{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){
      .hero-box {
        padding: 16px 14px;
        border-radius: 16px;
      }

      .round-profile {
        width: 100px;
        height: 100px;
      }

      .hero-box.bruno-small-box {
        width: 90%;
        padding: 8px 20px;
      }

      .panel{
        padding:18px;
        border-radius:20px;
      }

      .social-grid{
        grid-template-columns:1fr 1fr;
        gap:12px;
      }

      .social-btn{
        min-height:62px;
        padding:14px 10px;
      }

      .social-btn span{
        font-size:14px;
      }

      .hero-title{
        font-size:clamp(1.1rem, 5.2vw, 1.6rem);
      }

      .hero-subtitle{
        font-size:clamp(.8rem, 3.8vw, 1.05rem);
      }

      .problem-heading{
        font-size:.88rem;
      }
    }

    @media (max-width: 420px){
      .round-profile {
        width: 90px;
        height: 90px;
      }

      .hero-title{
        font-size:0.95rem;
        letter-spacing:1px;
      }

      .hero-subtitle{
        font-size:.78rem;
        letter-spacing:1px;
      }

      .problem-heading{
        font-size:.8rem;
      }
    }
  </style>  
</head>

  <script>  
    // Canvas Cyberpunk Matrix Drops
    const canvas = document.getElementById("matrixCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas(){  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>/{}[]";  
    const fontSize = 16;  
    let columns = Math.floor(window.innerWidth / fontSize);  
    let drops = Array(columns).fill(1);  
      
    function resetMatrix(){  
      columns = Math.floor(window.innerWidth / fontSize);  
      drops = Array(columns).fill(1);  
    }  
    window.addEventListener("resize", resetMatrix);  
      
    function drawMatrix(){  
      ctx.fillStyle = "rgba(2, 2, 8, 0.08)";  
      ctx.fillRect(0, 0, canvas.width, canvas.height);  
      
      for(let i = 0; i < drops.length; i++){  
        const char = chars.charAt(Math.floor(Math.random() * chars.length));  
        const x = i * fontSize;  
        const y = drops[i] * fontSize;  
      
        // Multi-color neon drops
        ctx.fillStyle = i % 2 === 0 ? "#00f0ff" : "#ff007f";  
        ctx.font = fontSize + "px monospace";  
        ctx.fillText(char, x, y);  
      
        ctx.fillStyle = "rgba(0, 240, 255, 0.15)";  
        ctx.fillRect(x, y - fontSize * 2, 2, fontSize * 2);  
      
        if(y > canvas.height && Math.random() > 0.972){  
          drops[i] = 0;  
        }  
        drops[i]++;  
      }  
    }  
      
    setInterval(drawMatrix, 28);  
      
    // WhatsApp Form Handler
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e){  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if(!service || !problem){  
        alert("Please select a service and write your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>  
</body>  
</html>
