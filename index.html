<html lang="en">

  <style>  
    *{  
      margin:0;  
      padding:0;  
      box-sizing:border-box;  
    }    
    :root{  
      /* COLORS FROM IMAGE 3 GRADIENT */
      --cyan: #00d9ff;  
      --purple: #9d5cff;  
      --pink: #ff4fd8;  
      --bg-dark: #070913;  
      --card-bg: rgba(14, 18, 36, 0.85);  
      --border: rgba(0, 217, 255, 0.25);  
      --text: #f0f4ff;  
      --text-muted: #8c9bb4;  
    }  

    html{ scroll-behavior:smooth; }

    body{

      font-family:"Inter", sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background: var(--bg-dark);
      position:relative;
    }

    /* DIGITAL CIRCUIT ANIMATION CANVAS */
    #cyberCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .container{
      width:min(1040px, 92%);
      margin:0 auto;
      position:relative;
      z-index:2;
      padding:10px 0 42px;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 5px;
    }

    .profile-pic-center {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 5px;
    }

    .round-profile{
      width:130px;
      height:130px;
      padding:3px;
      border-radius:50%;
      overflow:hidden;
      background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));  
    }

    .round-profile img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:cover;
      display:block;
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      padding: 20px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
    }

    .hero-box.bruno-small-box {
      width: 60%;
      margin: 0 auto;
      padding: 10px 30px;
      border-radius: 12px;
      margin-top: -2px;
    }

    .hero-box > * { position: relative; z-index: 1; }

    .hero-title{
      font-family:"Orbitron", sans-serif;
      font-weight:900;
      text-transform:uppercase;
      letter-spacing:1.5px;
      font-size:clamp(1.2rem, 3.2vw, 2.4rem);
      line-height:1.2;
      white-space:nowrap;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-subtitle{

      font-weight:800;
      text-transform:uppercase;
      letter-spacing: 1.2px;
      font-size:clamp(0.85rem, 2.2vw, 1.2rem);
      line-height:1.2;
      white-space:nowrap;
      display: block;
      text-align: center;
      color: var(--cyan);
    }

    .panel{

      overflow:hidden;
      border:1px solid var(--border);
      background:var(--card-bg);
      border-radius:20px;
      padding:22px;

    .panel-title{

      letter-spacing:1px;
      margin-bottom:16px;

      gap:12px;

    .problem-heading{

      text-decoration:none;

    .social-btn:hover{

      background: rgba(0, 217, 255, 0.1);

      text-align:center;

    .social-btn span{

      font-weight:700;

    }

      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
      margin-top:4px;
    }

    .full{ grid-column:1 / -1; }

    .input-wrap{

      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:13.5px;
      color:#c2d2ee;
      font-weight:700;
      letter-spacing:.25px;
    }

    input, select, textarea{

      border:none;
      outline:none;
      border-radius:12px;
      padding:15px 16px;
      background: rgba(5, 8, 20, 0.8);
      border:1px solid rgba(0, 217, 255, 0.2);
      color:var(--text);
      font-size:15px;
      font-family: "Fira Code", monospace;
      transition:0.25s ease;
    }

    input::placeholder, textarea::placeholder{

    }

    input:focus, select:focus, textarea:focus{
      border-color:var(--cyan);
      background: rgba(5, 8, 20, 0.95);
    }

    select option{
      background:#070913;
      color:#ffffff;
    }

    textarea{
      min-height:185px;
      resize:vertical;
      line-height:1.65;
    }

    .submit-btn{
      position:relative;
      overflow:hidden;
      border:none;
      outline:none;
      padding:16px 20px;
      border-radius:12px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      color:#ffffff;
      background: linear-gradient(90deg, var(--cyan), var(--purple), var(--pink));
      transition:0.3s ease;
    }

    .submit-btn:hover{
      opacity: 0.9;
      transform:translateY(-2px);
    }

    .submit-btn i{ margin-right:8px; font-size:18px; }

    @media (max-width: 820px){
      form{ grid-template-columns:1fr; }
    }

    @media (max-width: 640px){

        padding: 16px 14px;
        border-radius: 14px;

      .round-profile {

        height: 100px;
      }

      .hero-box.bruno-small-box {
        width: 90%;
        padding: 8px 20px;
      }

      .social-btn{

      .social-btn span{

      }

      .hero-title{

      }

      .hero-subtitle{
        font-size:clamp(.8rem, 3.8vw, 1.05rem);

    @media (max-width: 420px){

      }

      .hero-subtitle{
        font-size:.78rem;
        letter-spacing:1px;
      }

      .problem-heading{
        font-size:.8rem;
      }
    }

  <!-- ANIMATION SCRIPT WITH UPDATED COLOR PALETTE -->
  <script>  
    const canvas = document.getElementById("cyberCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas(){  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const nodes = [];
    const nodeCount = 55;
    const colors = ["#00d9ff", "#9d5cff", "#ff4fd8"];

    for(let i = 0; i < nodeCount; i++) {
      nodes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 1.1,
        vy: (Math.random() - 0.5) * 1.1,
        radius: Math.random() * 2 + 1,
        color: colors[Math.floor(Math.random() * colors.length)]
      });
    }

    function drawCircuit() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < nodes.length; i++) {
        let node = nodes[i];
        node.x += node.vx;
        node.y += node.vy;

        if(node.x < 0 || node.x > canvas.width) node.vx *= -1;
        if(node.y < 0 || node.y > canvas.height) node.vy *= -1;

        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fillStyle = node.color;
        ctx.fill();

        for(let j = i + 1; j < nodes.length; j++) {
          let node2 = nodes[j];
          let dist = Math.hypot(node.x - node2.x, node.y - node2.y);

          if(dist < 120) {
            ctx.beginPath();
            ctx.moveTo(node.x, node.y);
            ctx.lineTo(node2.x, node2.y);
            ctx.strokeStyle = `rgba(0, 217, 255, ${0.8 - dist / 120})`;
            ctx.lineWidth = 0.6;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawCircuit);
    }

    drawCircuit();
      
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e){  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if(!service || !problem){  
        alert("Please select a service and write your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>
