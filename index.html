<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Cyber Security Expert - Bruno</title>  
  
  <!-- Fonts & FontAwesome Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@500;700&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  
  
  <style>  
    /* ==========================================
       MATCHED COLOR PALETTE & ROOT
       ========================================== */
    * {  
      margin: 0;  
      padding: 0;  
      box-sizing: border-box;  
    }    

    :root {  
      --bg1: #05030a;  
      --bg2: #0a0614;  
      --card-bg: rgba(12, 8, 22, 0.88);  
      
      /* Profile Border Exact Match Colors */
      --pink: #ff007f;     
      --cyan: #00f3ff;     
      --yellow: #ffcc00;   
      
      --line: rgba(0, 243, 255, 0.3);  
      --line-pink: rgba(255, 0, 127, 0.35);  
      --text-color: #f8f5ff;  
      --muted-text: #8e80ab;  
    }  

    html { 
      scroll-behavior: smooth; 
    }

    body {
      min-height: 100vh;
      font-family: "Inter", sans-serif;
      color: var(--text-color);
      overflow-x: hidden;
      background: radial-gradient(circle at 50% 10%, rgba(255, 0, 127, 0.12), transparent 40%),
                  radial-gradient(circle at 10% 90%, rgba(0, 243, 255, 0.12), transparent 40%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      position: relative;
    }

    /* ==========================================
       BACKGROUND ANIMATIONS & CANVAS
       ========================================== */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.25;
    }

    .scanline-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0),
        rgba(255, 255, 255, 0) 50%,
        rgba(0, 0, 0, 0.35) 50%,
        rgba(0, 0, 0, 0.35)
      );
      background-size: 100% 4px;
    }

    .laser-beam {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--pink), var(--cyan), var(--yellow), transparent);
      box-shadow: 0 0 15px var(--pink);
      z-index: 1;
      pointer-events: none;
      animation: laserSweep 6s linear infinite;
    }

    @keyframes laserSweep {
      0% { transform: translateY(-10px); }
      100% { transform: translateY(100vh); }
    }

    /* ==========================================
       CONTAINER & HERO SECTION
       ========================================== */
    .container {
      width: min(1040px, 92%);
      margin: 0 auto;
      position: relative;
      z-index: 2;
      padding: 20px 0 60px;
    }

    .hero-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 5px;
    }

    .profile-pic-center {
      display: flex;
      justify-content: center;
      width: 100%;
      margin-bottom: 5px;
    }

    .round-profile {
      width: 135px;
      height: 135px;
      padding: 4px;
      border-radius: 50%;
      overflow: hidden;
      position: relative;
      background: linear-gradient(45deg, var(--pink), var(--cyan), var(--yellow), var(--pink));
      background-size: 300% 300%;
      animation: borderGlow 4s linear infinite;
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.4), 0 0 15px rgba(0, 243, 255, 0.3);
    }

    .round-profile img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      display: block;
    }

    @keyframes borderGlow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .hero-box {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(8, 4, 16, 0.88);
      backdrop-filter: blur(20px);
      box-shadow: 0 0 25px rgba(0, 243, 255, 0.15) inset, 0 15px 35px rgba(0,0,0,0.8);
      padding: 22px 26px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
    }

    .hero-box.bruno-small-box {
      width: 65%;
      margin: 0 auto;
      padding: 12px 30px;
      border-radius: 14px;
      border-color: var(--line-pink);
      box-shadow: 0 0 20px rgba(255, 0, 127, 0.2) inset;
    }

    .hero-title {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: clamp(1.3rem, 3.5vw, 2.5rem);
      line-height: 1.2;
      white-space: nowrap;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--yellow), var(--cyan));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shineText 4s linear infinite;
      filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.3));
    }

    .hero-subtitle {
      font-family: "Orbitron", sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: clamp(0.9rem, 2.3vw, 1.25rem);
      line-height: 1.2;
      white-space: nowrap;
      background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan), var(--pink));
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shineText 5s linear infinite;
      filter: drop-shadow(0 0 10px rgba(255, 0, 127, 0.4));
    }

    @keyframes shineText {
      to { background-position: 200% center; }
    }

    /* ==========================================
       PANELS & CARDS
       ========================================== */
    .panel {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 243, 255, 0.25);
      background: var(--card-bg);
      border-radius: 22px;
      padding: 26px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), 0 0 20px rgba(0, 243, 255, 0.08) inset;
      backdrop-filter: blur(20px);
      margin-top: 24px;
      transition: all 0.35s ease;
    }

    .panel:hover {
      border-color: var(--pink);
      box-shadow: 0 0 30px rgba(255, 0, 127, 0.25);
    }

    .panel-title {
      font-family: "Orbitron", sans-serif;
      font-size: 1.05rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .panel-title i {
      color: var(--cyan);
      font-size: 1.2rem;
      filter: drop-shadow(0 0 8px var(--cyan));
    }

    /* ==========================================
       SOCIAL BUTTONS
       ========================================== */
    .social-grid {
      display: flex;
      gap: 16px;
      justify-content: space-between;
    }

    .social-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(16, 9, 30, 0.75);
      border: 1px solid rgba(0, 243, 255, 0.2);
      color: #fff;
      text-decoration: none;
      transition: all 0.35s ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.5);
      font-family: 'Fira Code', monospace;
    }

    .social-btn:hover {
      transform: translateY(-4px);
      background: rgba(255, 0, 127, 0.12);
      border-color: var(--pink);
      box-shadow: 0 0 25px rgba(255, 0, 127, 0.35);
    }

    .social-btn i {
      font-size: 22px;
      color: var(--cyan);
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .social-btn:hover i {
      color: var(--yellow);
      transform: scale(1.2);
      filter: drop-shadow(0 0 10px var(--yellow));
    }

    .social-btn span {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }

    /* ==========================================
       FORM STYLES
       ========================================== */
    form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-top: 5px;
    }

    .full { 
      grid-column: 1 / -1; 
    }

    .input-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13.5px;
      color: var(--muted-text);
      font-weight: 700;
      letter-spacing: 0.5px;
      font-family: 'Fira Code', monospace;
    }

    input, select, textarea {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      padding: 16px 18px;
      background: rgba(4, 2, 10, 0.85);
      border: 1px solid rgba(0, 243, 255, 0.25);
      color: var(--text-color);
      font-size: 15px;
      font-family: 'Fira Code', monospace;
      transition: 0.3s ease;
    }

    input::placeholder, textarea::placeholder {
      color: #5d4f7a;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--pink);
      box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
      background: rgba(255, 0, 127, 0.05);
    }

    select option {
      background: #0a0514;
      color: #00f3ff;
    }

    textarea {
      min-height: 185px;
      resize: vertical;
      line-height: 1.65;
    }

    /* Perfect Profile Matching Submit Button */
    .submit-btn {
      position: relative;
      border: none;
      outline: none;
      padding: 18px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #05030a;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
      background: linear-gradient(90deg, var(--pink), var(--yellow), var(--cyan));
      background-size: 200% 100%;
      transition: 0.4s ease;
      box-shadow: 0 0 25px rgba(255, 0, 127, 0.4);
    }

    .submit-btn:hover {
      background-position: 100% 0;
      transform: translateY(-2px);
      box-shadow: 0 0 35px rgba(0, 243, 255, 0.6);
    }

    .submit-btn i { 
      margin-right: 8px; 
      font-size: 18px; 
    }

    /* Responsive Queries */
    @media (max-width: 820px) {
      form { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .hero-box { padding: 18px 16px; }
      .round-profile { width: 110px; height: 110px; }
      .hero-box.bruno-small-box { width: 90%; padding: 10px 20px; }
      .panel { padding: 20px; }
      .social-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .social-btn { padding: 15px 12px; }
    }
  </style>  
</head>

  <!-- Dynamic Hacker Matrix Rain Canvas Script -->
  <script>  
    const canvas = document.getElementById("matrixCanvas");  
    const ctx = canvas.getContext("2d");  
      
    function resizeCanvas() {  
      canvas.width = window.innerWidth;  
      canvas.height = window.innerHeight;  
    }  
    resizeCanvas();  
    window.addEventListener("resize", resizeCanvas);  
      
    const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&*+-<>/{}[]";  
    const fontSize = 16;  
    let columns = Math.floor(window.innerWidth / fontSize);  
    let drops = Array(columns).fill(1);  
      
    function resetMatrix() {  
      columns = Math.floor(window.innerWidth / fontSize);  
      drops = Array(columns).fill(1);  
    }  
    window.addEventListener("resize", resetMatrix);  
      
    // Matrix Rain Colors matching Profile Border Exactly
    function drawMatrix() {  
      ctx.fillStyle = "rgba(5, 3, 10, 0.08)";  
      ctx.fillRect(0, 0, canvas.width, canvas.height);  
      
      for(let i = 0; i < drops.length; i++) {  
        const char = chars.charAt(Math.floor(Math.random() * chars.length));  
        const x = i * fontSize;  
        const y = drops[i] * fontSize;  
      
        // Color distribution matching Pink, Cyan, Yellow
        ctx.fillStyle = i % 3 === 0 ? "#ff007f" : (i % 3 === 1 ? "#00f3ff" : "#ffcc00");  
        ctx.font = fontSize + "px monospace";  
        ctx.fillText(char, x, y);  
      
        if(y > canvas.height && Math.random() > 0.975) {  
          drops[i] = 0;  
        }  
        drops[i]++;  
      }  
    }  
      
    setInterval(drawMatrix, 30);  
      
    // WhatsApp Form Handler
    const form = document.getElementById("supportForm");  
    const whatsappNumber = "8801347344027";  
      
    form.addEventListener("submit", function(e) {  
      e.preventDefault();  
      
      const name = document.getElementById("name").value.trim();  
      const service = document.getElementById("service").value;  
      const problem = document.getElementById("problem").value.trim();  
      
      if(!service || !problem) {  
        alert("Please select a service and write your problem.");  
        return;  
      }  
      
      const finalName = name ? name : "Not Provided";  
      
      const message =  
`Hello Bruno,  
      
New Support Request  
      
Name: ${finalName}  
Service: ${service}  
      
Problem:  
${problem}`;  
      
      const encodedMessage = encodeURIComponent(message);  
      const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;  
      
      window.open(whatsappURL, "_blank");  
    });  
  </script>
