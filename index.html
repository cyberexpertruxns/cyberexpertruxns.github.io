<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>CYBER COMMAND | BRUNO</title>  
  
  <!-- Modern Tech Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">  
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>  
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>  

  <style>  
    :root {  
      --neon-blue: #00f3ff;  
      --neon-purple: #b026ff;  
      --neon-pink: #ff0055;  
      --bg-black: #02040a;  
      --panel-bg: rgba(6, 11, 25, 0.75);  
      --panel-border: rgba(0, 243, 255, 0.15);  
      --text-main: #e2e8f0;  
      --text-muted: #64748b;  
    }  

    * {  
      margin: 0;  
      padding: 0;  
      box-sizing: border-box;  
    }    

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text-main);
      background: var(--bg-black);
      overflow-x: hidden;
      position: relative;
    }

    /* CYBER MATRIX CANVAS */
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .app-wrapper {
      position: relative;
      z-index: 2;
      width: min(850px, 92%);
      margin: 30px auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* SYSTEM STATUS BAR */
    .status-bar {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 10px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--neon-blue);
      box-shadow: 0 0 15px rgba(0, 243, 255, 0.05);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background: var(--neon-blue);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--neon-blue);
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.2; }
    }

    /* PROFILE COMMAND CARD */
    .hero-card {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 30px;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .hero-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
    }

    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
    }

    .avatar-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      border: 2px solid var(--neon-blue);
      padding: 4px;
      background: rgba(0,0,0,0.5);
    }

    .avatar-wrapper::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px dashed var(--neon-purple);
      animation: rotateRing 12s linear infinite;
    }

    @keyframes rotateRing {
      100% { transform: rotate(360deg); }
    }

    .main-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff 0%, var(--neon-blue) 50%, var(--neon-purple) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-transform: uppercase;
    }

    .sub-title {
      font-family: 'Share Tech Mono', monospace;
      color: var(--neon-pink);
      font-size: 1rem;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* CYBER PANELS */
    .cyber-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(16px);
      border-radius: 20px;
      padding: 24px;
      position: relative;
    }

    .panel-header {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .panel-header i {
      color: var(--neon-blue);
      font-size: 1.2rem;
    }

    /* MODERN SOCIAL CARDS GRID */
    .social-cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    .card-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card-item i {
      font-size: 1.5rem;
      color: var(--neon-blue);
      transition: transform 0.3s ease;
    }

    .card-item .info {
      display: flex;
      flex-direction: column;
    }

    .card-item .info .label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .card-item .info .sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
    }

    .card-item:hover {
      background: rgba(0, 243, 255, 0.05);
      border-color: var(--neon-blue);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0, 243, 255, 0.1);
    }

    .card-item:hover i {
      transform: scale(1.15);
      color: var(--neon-pink);
    }

    /* FORM STYLING */
    .cyber-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.85rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--neon-blue);
      text-transform: uppercase;
    }

    .form-control {
      width: 100%;
      background: rgba(2, 4, 10, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      padding: 14px 16px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--neon-purple);
      box-shadow: 0 0 15px rgba(176, 38, 255, 0.25);
    }

    select.form-control option {
      background: #060b19;
      color: #fff;
    }

    textarea.form-control {
      min-height: 120px;
      resize: vertical;
    }

    .action-btn {
      margin-top: 10px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border: none;
      outline: none;
      border-radius: 12px;
      padding: 16px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 20px rgba(0, 243, 255, 0.2);
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(176, 38, 255, 0.4);
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
    }

    @media (max-width: 600px) {
      .social-cards {
        grid-template-columns: 1fr;
      }
      .app-wrapper {
        margin: 15px auto;
      }
      .hero-card {
        padding: 20px;
      }
    }
  </style>

  <script>  
    /* CYBER MATRIX CANVAS ANIMATION */
    const canvas = document.getElementById('matrixCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const chars = '0110010101010101010100101010101';
    const fontSize = 14;
    const columns = Math.floor(window.innerWidth / fontSize);
    const drops = Array(columns).fill(1);

    function drawMatrix() {
      ctx.fillStyle = 'rgba(2, 4, 10, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(0, 243, 255, 0.35)';
      ctx.font = fontSize + 'px monospace';

      for (let i = 0; i < drops.length; i++) {
        const text = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
          drops[i] = 0;
        }
        drops[i]++;
      }
    }

    setInterval(drawMatrix, 40);

    /* FORM SUBMISSION */
    document.getElementById('cyberForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('usr_name').value.trim() || 'Anonymous';
      const service = document.getElementById('usr_service').value;
      const problem = document.getElementById('usr_problem').value.trim();
      
      const msg = `[CYBER DISPATCH]\nUser: ${name}\nCategory: ${service}\n\nDetails:\n${problem}`;
      
      const targetPhone = "8801347344027";
      window.open(`https://wa.me/${targetPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    });
  </script>
